  <style>
    @font-face {
      font-family: 'Darumadrop One';
      src: url('/fonts/DarumadropOne-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Domine';
      src: url('/fonts/Domine-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Domine';
      src: url('/fonts/Domine-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'Domine';
      src: url('/fonts/Domine-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'Domine';
      src: url('/fonts/Domine-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* Default: normal cursor (touch / mobile). */
    html, body, * { cursor: auto !important; }
    /* Custom cursor only on real mouse + hover-capable devices (not phones / most tablets). */
    @media (pointer: fine) and (hover: hover) {
      html, body, * { cursor: none !important; }
    }
    html { -webkit-text-size-adjust: 100%; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Domine', Georgia, serif; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }
    #custom-cursor {
      position: fixed; top: 0; left: 0; width: 36px; height: 40px;
      pointer-events: none; z-index: 99999;
      background: url("/2D/cursor.png") no-repeat 0 0;
      background-size: 36px 40px;
      opacity: 0; transition: opacity 0.4s ease;
    }
    /* Touch / no-hover: hide custom cursor if DOM exists (e.g. cached HTML). */
    @media (pointer: coarse), (hover: none) {
      #custom-cursor { display: none !important; }
    }
  </style>
  <script>
    (function(){
      /* Skip synthetic triangle cursor on touch / mobile — avoids stray triangle on touchmove. */
      try {
        if (!window.matchMedia("(pointer: fine)").matches) return;
        if (!window.matchMedia("(hover: hover)").matches) return;
      } catch (e) { return; }
      var c = document.createElement('div');
      c.id = 'custom-cursor';
      document.documentElement.appendChild(c);
      var ox = 3, oy = 3, t, visible = false;
      function show() {
        if (!visible) { c.style.opacity = '1'; visible = true; }
        clearTimeout(t);
        t = setTimeout(function(){ c.style.opacity = '0'; visible = false; }, 2000);
      }
      document.addEventListener('mousemove', function(e) {
        c.style.transform = 'translate(' + (e.clientX - ox) + 'px,' + (e.clientY - oy) + 'px)';
        show();
      });
      document.addEventListener('mousedown', show);
      t = setTimeout(function(){ c.style.opacity = '0'; visible = false; }, 2000);
    })();
  </script>
